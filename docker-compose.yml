services:
  samsung-soundbar-bridge:
    build: .
    container_name: samsung-soundbar-bridge
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      SOUNDBAR_HOST: "${SOUNDBAR_HOST:?set the soundbar IP or DNS name}"
      SOUNDBAR_PORT: "${SOUNDBAR_PORT:-1516}"
      SOUNDBAR_SCHEME: "${SOUNDBAR_SCHEME:-https}"
      SOUNDBAR_VERIFY_SSL: "${SOUNDBAR_VERIFY_SSL:-false}"
      SOUNDBAR_TIMEOUT_SECONDS: "${SOUNDBAR_TIMEOUT_SECONDS:-5}"
      SOUNDBAR_RETRY_ON_TOKEN_ERROR: "${SOUNDBAR_RETRY_ON_TOKEN_ERROR:-true}"
      BRIDGE_HOST: "${BRIDGE_HOST:-0.0.0.0}"
      BRIDGE_PORT: "${BRIDGE_PORT:-8088}"
      BRIDGE_AUTH_TOKEN: "${BRIDGE_AUTH_TOKEN:?set a strong bridge token}"
      BRIDGE_AUTH_MODE: "${BRIDGE_AUTH_MODE:-query_or_header}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      LOG_JSON: "${LOG_JSON:-false}"
      DEBUG_ENDPOINTS: "${DEBUG_ENDPOINTS:-false}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8088/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
