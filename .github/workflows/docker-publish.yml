name: Publish Docker image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      build_ref:
        description: 'Git ref to build (branch, tag, or commit)'
        required: false
        default: 'main'
      image_tag:
        description: 'Container image tag to publish, e.g. 0.1.0'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          repo_name="${GITHUB_REPOSITORY#*/}"
          image="ghcr.io/${owner_lc}/${repo_name}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            build_ref="${{ inputs.build_ref }}"
            tag="${{ inputs.image_tag }}"
            if [ -z "$tag" ]; then
              tag="${build_ref#v}"
            fi
          else
            build_ref="${GITHUB_REF_NAME}"
            if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
              tag="${GITHUB_REF_NAME#v}"
            else
              tag="main"
            fi
          fi

          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "build_ref=$build_ref" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.build_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Local FastAPI bridge for controlling Samsung Soundbars from Loxone
            org.opencontainers.image.licenses=MIT
