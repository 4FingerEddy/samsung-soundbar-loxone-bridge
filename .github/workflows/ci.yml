name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt pyyaml

      - name: Run unit tests
        run: pytest -q

      - name: Validate XML templates and compose YAML
        run: |
          python - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET
          import yaml

          for path in Path('deployment/templates').glob('*.xml'):
              ET.parse(path)
              print(f'xml_ok {path}')

          for path in [Path('docker-compose.yml'), Path('deployment/portainer-stack.image.yml')]:
              yaml.safe_load(path.read_text(encoding='utf-8'))
              print(f'yaml_ok {path}')
          PY

      - name: Check for private staging identifiers
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          patterns = [
              r'192\.168\.10\.' + r'163', r'192\.168\.5\.' + r'40', r'DS' + r'720',
              r'root' + r'keeper', r'/home/root' + r'keeper', r'/mnt/synology-root' + r'keeper',
              r'504F94' + r'A09195', r'AGENTS\.' + r'md', r'PICKUP_' + r'COMMAND',
              r'manifest\.' + r'yaml', r'know' + r'ledge/', r'rep' + r'orts/',
          ]
          rx = re.compile('|'.join(patterns), re.I)
          hits = []
          for path in Path('.').rglob('*'):
              if not path.is_file() or '.git' in path.parts:
                  continue
              try:
                  text = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              for line_no, line in enumerate(text.splitlines(), 1):
                  if rx.search(line):
                      hits.append(f'{path}:{line_no}:{line[:160]}')
          if hits:
              print('\n'.join(hits))
              raise SystemExit(f'private identifier hits: {len(hits)}')
          print('private_identifier_hits=0')
          PY
